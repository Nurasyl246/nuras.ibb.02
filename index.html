<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuras.ibb</title>
  <style>
    :root{
      --bg1:#050816;
      --bg2:#09142b;
      --text:#eaf1ff;
      --muted:#9db0d0;
      --blue:#3c7dff;
      --green:#2dd4bf;
      --shadow: 0 24px 80px rgba(0,0,0,.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(60,125,255,.20), transparent 26%),
        radial-gradient(circle at top right, rgba(116,167,255,.16), transparent 22%),
        radial-gradient(circle at bottom left, rgba(45,212,191,.10), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .glow {
      position: fixed;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      filter: blur(36px);
      opacity: .22;
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite;
    }
    .g1 { top: 8%; left: 6%; background: #2f6bff; }
    .g2 { top: 18%; right: 6%; background: #6ea8ff; animation-duration: 16s; }
    .g3 { bottom: 8%; left: 18%; background: #0ea5e9; animation-duration: 18s; }

    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(18px,-20px) scale(1.08); }
    }

    @keyframes floatUp {
      0%,100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-10px) translateX(6px); }
    }

    @keyframes shine {
      0%, 35% { transform: translateX(-120%); }
      70%, 100% { transform: translateX(120%); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: linear-gradient(180deg, rgba(13,23,48,.92), rgba(8,14,30,.94));
      border: 1px solid rgba(120,160,255,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.05) 35%, transparent 70%);
      transform: translateX(-120%);
      animation: shine 6s ease-in-out infinite;
      pointer-events: none;
    }

    .top-banner {
      border: 1px solid rgba(116,167,255,.38);
      background: linear-gradient(180deg, rgba(8,18,38,.95), rgba(10,18,40,.8));
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
      animation: floatUp 5s ease-in-out infinite;
      position: relative;
      z-index: 1;
    }

    .top-banner .line1 {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .top-banner .line2 {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: .2px;
    }

    .top-banner a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      border: 1px solid rgba(116,167,255,.55);
      background: linear-gradient(135deg, #214cff, #4a86ff);
      box-shadow: 0 10px 24px rgba(47,107,255,.25);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .top-banner a:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 14px 28px rgba(47,107,255,.35);
      filter: brightness(1.05);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1.1;
      position: relative;
      z-index: 1;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .upload-wrap {
      margin: 16px 0 10px;
      position: relative;
      z-index: 1;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      padding: 15px 18px;
      border-radius: 18px;
      border: 1px solid rgba(116,167,255,.45);
      background: linear-gradient(135deg, rgba(30,64,175,.95), rgba(18,96,170,.95));
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      user-select: none;
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 40px rgba(13,78,143,.32);
      filter: brightness(1.06);
    }

    .small {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .progress-wrap {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(116,167,255,.12);
      position: relative;
      z-index: 1;
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-track {
      height: 8px;
      background: rgba(255,255,255,.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(116,167,255,.12);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #214cff, #2dd4bf);
      transition: width .15s linear;
    }

    .copy-all-btn {
      margin-top: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(116,167,255,.3);
      background: linear-gradient(135deg, #162b5d, #23458c);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease, opacity .2s ease;
    }

    .copy-all-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .copy-all-btn:disabled { opacity: .5; cursor: not-allowed; }

    #status {
      margin-top: 12px;
      min-height: 22px;
      color: var(--text);
      font-size: 14px;
      position: relative;
      z-index: 1;
    }

    .preview-wrap, .result-wrap {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(116,167,255,.12);
      position: relative;
      z-index: 1;
    }

    .preview-title, .result-title {
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
    }

    .preview-grid img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(116,167,255,.2);
      background: #050816;
    }

    .link-item {
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      background: rgba(255,255,255,.04);
      border: 1px solid rgba(116,167,255,.12);
    }

    .link-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: center;
      margin-bottom: 8px;
    }

    .link-head h3 {
      margin: 0;
      font-size: 15px;
    }

    .link-url {
      width: 100%;
      min-height: 48px;
      resize: vertical;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(116,167,255,.18);
      background: rgba(255,255,255,.05);
      color: #eaf1ff;
      font-family: monospace;
      font-size: 13px;
    }

    .copy-btn {
      padding: 10px 14px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #14b8a6, #2dd4bf);
      color: #06131d;
      cursor: pointer;
      font-weight: 800;
      white-space: nowrap;
      transition: transform .2s ease, filter .2s ease;
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
      position: relative;
      z-index: 1;
    }

    @media (max-width: 520px) {
      .card { padding: 16px; }
      .link-head { flex-direction: column; align-items: flex-start; }
      .copy-btn { width: 100%; }
      .top-banner .line2 { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="glow g1" aria-hidden="true"></div>
  <div class="glow g2" aria-hidden="true"></div>
  <div class="glow g3" aria-hidden="true"></div>

  <main class="wrap">
    <div class="card">
      <div class="top-banner">
        <div class="line1">Подпишись на Нураса в ВК!</div>
        <div class="line2">Nuras.ibb</div>
        <div style="margin-top:6px;color:#b8c8e8;font-size:13px;">Лучший способ делиться своими моментами</div>
        <a href="https://vk.ru/nurasylsattar" target="_blank" rel="noopener">ПОДПИСАТЬСЯ</a>
      </div>

      <h1>Загрузите фото — получите ссылку</h1>
      <p class="subtitle">До 20 фото за раз, только прямые ссылки.</p>

      <div class="upload-wrap">
        <input id="fileInput" type="file" accept="image/*" multiple style="display:none" />
        <label class="upload-btn" for="fileInput">ВЫБРАТЬ И ЗАГРУЗИТЬ</label>
        <div class="small">Можно выбрать до 20 фото сразу.</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-top">
          <span>Прогресс загрузки</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <button id="copyAllBtn" class="copy-all-btn" type="button" disabled>Скопировать всё</button>
      </div>

      <div id="previewWrap" class="preview-wrap" style="display:none;">
        <div class="preview-title">Превью перед загрузкой</div>
        <div id="previewGrid" class="preview-grid"></div>
      </div>

      <div id="status"></div>

      <div id="resultWrap" class="result-wrap" style="display:none;">
        <div class="result-title">Прямые ссылки</div>
        <div id="linksContainer"></div>
      </div>

      <footer>Красиво, просто и удобно.</footer>
    </div>
  </main>

  <script>
    const IMGBB_API_KEY = '4a569847f7d6be115b4e46120f2d1f73';

    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const previewWrap = document.getElementById('previewWrap');
    const previewGrid = document.getElementById('previewGrid');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const copyAllBtn = document.getElementById('copyAllBtn');
    const resultWrap = document.getElementById('resultWrap');
    const linksContainer = document.getElementById('linksContainer');

    let allLinks = [];

    function setProgress(percent) {
      const value = Math.max(0, Math.min(100, Math.round(percent)));
      progressFill.style.width = value + '%';
      progressPercent.textContent = value + '%';
    }

    function copyText(text, button) {
      navigator.clipboard.writeText(text).then(() => {
        const old = button.textContent;
        button.textContent = 'Скопировано!';
        setTimeout(() => button.textContent = old, 1200);
      }).catch(err => console.error(err));
    }

    function makeLinkItem(index, url) {
      const item = document.createElement('div');
      item.className = 'link-item';

      const head = document.createElement('div');
      head.className = 'link-head';

      const title = document.createElement('h3');
      title.textContent = `Фото ${index}`;

      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.type = 'button';
      btn.textContent = 'Копировать ссылку';
      btn.addEventListener('click', () => copyText(url, btn));

      head.appendChild(title);
      head.appendChild(btn);

      const ta = document.createElement('textarea');
      ta.className = 'link-url';
      ta.readOnly = true;
      ta.value = url;

      item.appendChild(head);
      item.appendChild(ta);

      return item;
    }

    function uploadOne(file) {
      return new Promise((resolve) => {
        const reader = new FileReader();

        reader.onload = async () => {
          try {
            const base64 = String(reader.result).split(',')[1] || '';
            const form = new FormData();
            form.append('key', IMGBB_API_KEY);
            form.append('image', base64);

            const res = await fetch('https://api.imgbb.com/1/upload', {
              method: 'POST',
              body: form
            });

            const json = await res.json();

            if (json && json.success) {
              resolve(json.data.url || '');
            } else {
              console.error('ImgBB error:', json);
              resolve('');
            }
          } catch (err) {
            console.error(err);
            resolve('');
          }
        };

        reader.onerror = () => resolve('');
        reader.readAsDataURL(file);
      });
    }

    fileInput.addEventListener('change', async () => {
      const files = Array.from(fileInput.files).slice(0, 20);
      if (!files.length) return;

      previewWrap.style.display = 'block';
      previewGrid.innerHTML = '';
      resultWrap.style.display = 'block';
      linksContainer.innerHTML = '';
      allLinks = [];
      copyAllBtn.disabled = true;
      setProgress(0);
      status.textContent = '';

      if (fileInput.files.length > 20) {
        status.textContent = 'Выбраны первые 20 фото.';
      }

      files.forEach(file => {
        const img = document.createElement('img');
        img.src = URL.createObjectURL(file);
        img.alt = file.name;
        previewGrid.appendChild(img);
      });

      for (let i = 0; i < files.length; i++) {
        status.textContent = `Загрузка ${i + 1}/${files.length}...`;
        const url = await uploadOne(files[i]);

        if (url) {
          allLinks.push(url);
          linksContainer.appendChild(makeLinkItem(i + 1, url));
        } else {
          const fail = document.createElement('div');
          fail.className = 'link-item';
          fail.textContent = `Фото ${i + 1}: ошибка загрузки`;
          linksContainer.appendChild(fail);
        }

        setProgress(((i + 1) / files.length) * 100);
      }

      status.textContent = 'Готово.';
      copyAllBtn.disabled = allLinks.length === 0;
      fileInput.value = '';
    });

    copyAllBtn.addEventListener('click', () => {
      copyText(allLinks.join('\n'), copyAllBtn);
    });
  </script>
</body>
  </html>
