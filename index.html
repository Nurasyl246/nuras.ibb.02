<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuras.ibb</title>
  <style>
    :root{
      --bg1:#050816;
      --bg2:#09142b;
      --card:#0b1220cc;
      --card2:#0d1730;
      --line:#1f3b77;
      --line2:#2f6bff;
      --text:#eaf1ff;
      --muted:#9db0d0;
      --blue:#3c7dff;
      --blue2:#74a7ff;
      --green:#2dd4bf;
      --shadow: 0 24px 80px rgba(0,0,0,.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(60,125,255,.20), transparent 26%),
        radial-gradient(circle at top right, rgba(116,167,255,.16), transparent 22%),
        radial-gradient(circle at bottom left, rgba(45,212,191,.10), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    /* animated background glows */
    .glow {
      position: fixed;
      inset: auto;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      filter: blur(36px);
      opacity: .22;
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite;
    }
    .g1 { top: 8%; left: 6%; background: #2f6bff; }
    .g2 { top: 18%; right: 6%; background: #6ea8ff; animation-duration: 16s; }
    .g3 { bottom: 8%; left: 18%; background: #0ea5e9; animation-duration: 18s; }

    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(18px,-20px) scale(1.08); }
    }

    @keyframes floatUp {
      0%,100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-10px) translateX(6px); }
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 560px;
      background: linear-gradient(180deg, rgba(13,23,48,.92), rgba(8,14,30,.94));
      border: 1px solid rgba(120,160,255,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.05) 35%, transparent 70%);
      transform: translateX(-120%);
      animation: shine 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes shine {
      0%, 35% { transform: translateX(-120%); }
      70%, 100% { transform: translateX(120%); }
    }

    .top-banner {
      border: 1px solid rgba(116,167,255,.38);
      background: linear-gradient(180deg, rgba(8,18,38,.95), rgba(10,18,40,.8));
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
      animation: floatUp 5s ease-in-out infinite;
    }

    .top-banner .line1 {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .top-banner .line2 {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: .2px;
    }

    .top-banner a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      border: 1px solid rgba(116,167,255,.55);
      background: linear-gradient(135deg, #214cff, #4a86ff);
      box-shadow: 0 10px 24px rgba(47,107,255,.25);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .top-banner a:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 14px 28px rgba(47,107,255,.35);
      filter: brightness(1.05);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1.1;
      letter-spacing: .2px;
    }

    .subtitle {
      margin: 0 0 22px;
      color: var(--muted);
      font-size: 14px;
    }

    .upload-wrap {
      margin: 16px 0 10px;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 18px;
      border-radius: 18px;
      border: 1px solid rgba(116,167,255,.45);
      background: linear-gradient(135deg, rgba(30,64,175,.95), rgba(18,96,170,.95));
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      box-shadow: 0 18px 30px rgba(13,78,143,.22);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
      user-select: none;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 40px rgba(13,78,143,.32);
      filter: brightness(1.06);
    }

    .small {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    #status {
      margin-top: 12px;
      min-height: 22px;
      color: var(--text);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.2);
      border-top: 2px solid #8ab4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: -3px;
      margin-left: 6px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .result {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(7, 13, 28, .75);
      border: 1px solid rgba(116,167,255,.16);
    }

    .result-title {
      font-weight: 700;
      margin-bottom: 12px;
    }

    .formats {
      display: grid;
      gap: 10px;
      margin: 14px 0;
    }

    .format {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: #dbe7ff;
      padding: 10px 12px;
      border-radius: 12px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(255,255,255,.05);
    }

    .link-row {
      display: flex;
      gap: 10px;
      align-items: stretch;
      margin-top: 10px;
    }

    .link-text {
      flex: 1;
      padding: 12px 14px;
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(116,167,255,.18);
      border-radius: 14px;
      font-family: monospace;
      font-size: 13px;
      word-break: break-all;
      min-height: 46px;
      color: #eaf1ff;
    }

    .copy-btn {
      padding: 0 16px;
      min-width: 124px;
      background: linear-gradient(135deg, #14b8a6, #2dd4bf);
      color: #06131d;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .2s ease, filter .2s ease;
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    #viewLink {
      display: inline-block;
      margin-top: 12px;
      color: #8ab4ff;
      text-decoration: none;
      font-weight: 700;
    }

    #viewLink:hover { text-decoration: underline; }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 520px) {
      .card { padding: 16px; }
      .link-row { flex-direction: column; }
      .copy-btn { width: 100%; min-height: 46px; }
      .top-banner .line2 { font-size: 16px; }
    }
  </style>
</head>
<body>
  <div class="glow g1" aria-hidden="true"></div>
  <div class="glow g2" aria-hidden="true"></div>
  <div class="glow g3" aria-hidden="true"></div>

  <main class="wrap">
    <div class="card">
      <div class="top-banner">
  <div style="font-size:16px;margin-bottom:8px;">Подпишись на Нураса в ВК!</div>
  <a href="https://vk.ru/nurasylsattar" target="_blank">ПОДПИСАТЬСЯ</a>
      </div>

      <h1>Загрузите фото — получите ссылку</h1>
      <p class="subtitle">Быстрая загрузка и удобные форматы ссылки.</p>

      <div class="upload-wrap">
        <input id="fileInput" type="file" accept="image/*" style="display:none" />
        <label class="upload-btn" for="fileInput">ВЫБРАТЬ И ЗАГРУЗИТЬ</label>
        <div class="small">Поддерживаются изображения любых популярных форматов.</div>
      </div>

      <div id="status"></div>

      <div id="resultArea" class="result" style="display:none">
  <div id="imagesContainer"></div>
      </div>

        <div class="link-row">
          <div id="linkText" class="link-text" aria-live="polite"></div>
          <button id="copyBtn" class="copy-btn">Копировать</button>
        </div>

        <a id="viewLink" href="#" target="_blank">Открыть изображение</a>
      </div>

      <footer>
        Красиво, просто используй для кайфа.
      </footer>
    </div>
  </main>

  <script>
const IMGBB_API_KEY = '4a569847f7d6be115b4e46120f2d1f73';

const fileInput = document.getElementById('fileInput');
const status = document.getElementById('status');
const resultArea = document.getElementById('resultArea');
const imagesContainer = document.getElementById('imagesContainer');

fileInput.setAttribute("multiple", true);

fileInput.addEventListener('change', async () => {
  const files = Array.from(fileInput.files).slice(0, 20);
  if (!files.length) return;

  status.innerHTML = `Загружаю ${files.length} фото <span class="spinner"></span>`;
  imagesContainer.innerHTML = '';

  for (let i = 0; i < files.length; i++) {
    const file = files[i];

    const reader = new FileReader();

    reader.onload = async (e) => {
      const base64 = e.target.result.split(',')[1];

      const form = new FormData();
      form.append('key', IMGBB_API_KEY);
      form.append('image', base64);

      try {
        const res = await fetch('https://api.imgbb.com/1/upload', {
          method: 'POST',
          body: form
        });

        const json = await res.json();

        if (json.success) {
          createImageBlock(json.data, i + 1);
        }
      } catch (err) {
        console.error(err);
      }
    };

    reader.readAsDataURL(file);
  }

  resultArea.style.display = 'block';
  status.innerHTML = 'Готово ✅';
});

function createImageBlock(data, index) {
  const url = data.url;
  const medium = data.medium?.url || url;
  const thumb = data.thumb?.url || url;

  const block = document.createElement('div');
  block.style.marginBottom = "25px";

  block.innerHTML = `
    <div style="font-weight:700;margin-bottom:10px">[Фото ${index}]</div>

    ${makeRow("Ссылка на просмотр", url)}
    ${makeRow("Прямая ссылка", url)}

    <div style="margin-top:10px;font-weight:600">HTML-коды</div>
    ${makeRow("HTML-код изображения", `<img src="${url}">`)}
    ${makeRow("HTML полноразмерный со ссылкой", `<a href="${url}"><img src="${url}"></a>`)}
    ${makeRow("HTML средний со ссылкой", `<a href="${url}"><img src="${medium}"></a>`)}
    ${makeRow("HTML миниатюра со ссылкой", `<a href="${url}"><img src="${thumb}"></a>`)}

    <div style="margin-top:10px;font-weight:600">BB-коды</div>
    ${makeRow("BB полноразмерный", `[img]${url}[/img]`)}
    ${makeRow("BB полноразмерный со ссылкой", `[url=${url}][img]${url}[/img][/url]`)}
    ${makeRow("BB средний со ссылкой", `[url=${url}][img]${medium}[/img][/url]`)}
    ${makeRow("BB миниатюра со ссылкой", `[url=${url}][img]${thumb}[/img][/url]`)}
  `;

  imagesContainer.appendChild(block);
}

function makeRow(title, value) {
  return `
    <div style="margin-top:6px">
      <div style="font-size:12px;color:#aaa">${title}</div>
      <div style="display:flex;gap:8px;margin-top:3px">
        <div style="flex:1;background:#111;padding:6px;border-radius:6px;font-size:12px;word-break:break-all">${value}</div>
        <button onclick="copyText(this)" style="padding:6px 10px;background:#3c7dff;border:none;color:white;border-radius:6px;cursor:pointer">📋</button>
      </div>
    </div>
  `;
}

function copyText(btn) {
  const text = btn.parentElement.querySelector('div').textContent;
  navigator.clipboard.writeText(text);
  btn.textContent = "✅";
  setTimeout(() => btn.textContent = "📋", 1500);
}
  </script>
</body>
    </html>
