<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотохостинг</title>
    <style>
        /* Новые стили для интерфейса загрузки */
        .flower {
            position: fixed;
            width: 120px;
            height: 120px;
            opacity: 0.1;
            z-index: -1;
        }
        .f1 {
            top: 10%;
            left: 10%;
            animation: float 6s ease-in-out infinite;
        }
        .f2 {
            top: 20%;
            right: 10%;
            animation: float 8s ease-in-out infinite reverse;
        }
        .f3 {
            bottom: 10%;
            left: 20%;
            animation: float 10s ease-in-out infinite;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        .center {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }
        .subscribe {
            margin-bottom: 30px;
            font-size: 14px;
            color: #666;
        }
        .subscribe a {
            color: #007bff;
            text-decoration: none;
        }
        .upload-wrap {
            margin: 20px 0;
        }
        .upload-btn {
            display: inline-block;
            padding: 12px 24px;
            background: linear-gradient(45deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 25px;
            cursor: pointer;
            font-size: 16px;
            transition: transform 0.2s;
        }
        .upload-btn:hover {
            transform: scale(1.05);
        }
        .small {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }
        .result {
            margin-top: 20px;
            text-align: left;
        }
        .formats {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 15px 0;
        }
        .format {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }
        .link-row {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .link-text {
            flex: 1;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 4px;
            font-family: monospace;
            font-size: 14px;
            word-break: break-all;
        }
        .copy-btn {
            padding: 8px 16px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .copy-btn:hover {
            background: #218838;
        }
        footer {
            margin-top: 30px;
            font-size: 12px;
            color: #888;
        }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #f3f3f3;
            border-top: 2px solid #3498db;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="flower f1" aria-hidden="true"></div>
      <div class="flower f2" aria-hidden="true"></div>
        <div class="flower f3" aria-hidden="true"></div>

          <main class="center">
              <div class="card">
                    <div class="subscribe">
                            <div>Подпишитесь на <strong>Нураса</strong></div>
                                    <div><a id="subscribeBtn" href="https://vk.ru/nurasylsattar" target="_blank" rel="noopener">Подписаться</a></div>
                                          </div>

                                                <h1>Загрузите фото — получите ссылку</h1>

                                                      <div class="upload-wrap">
                                                              <input id="fileInput" type="file" accept="image/*" style="display:none">
                                                                      <label class="upload-btn" for="fileInput">Загрузить фото</label>
                                                                              <div class="small">JPG, PNG, GIF, WEBP — максимум 5 МБ.</div>
                                                                                    </div>

                                                                                          <div id="status" style="margin-top:12px"></div>

                                                                                                <div id="resultArea" class="result" style="display:none">
                                                                                                        <div style="font-weight:600;margin-bottom:8px">[Фото 1]</div>

                                                                                                                <div class="formats">
                                                                                                                          <label class="format"><input type="radio" name="format" value="direct" checked> Прямая ссылка</label>
                                                                                                                                    <label class="format"><input type="radio" name="format" value="html"> HTML &lt;img&gt;</label>
                                                                                                                              <label class="format"><input type="radio" name="format" value="html_link"> HTML с ссылкой</label>
                                                                                                                                                <label class="format"><input type="radio" name="format" value="bb_full_link"> BB-код со ссылкой</label>
                                                                                                                                                        </div>

                                                                                                                                                                <div class="link-row" style="margin-top:8px">
                                                                                                                                                                          <div id="linkText" class="link-text" aria-live="polite"></div>
                                                                                                                                                                                    <button id="copyBtn" class="copy-btn">Копировать</button>
                                                                                                                                                                                            </div>

                                                                                                                                                                                                    <div style="margin-top:8px"><a id="viewLink" href="#" target="_blank">Открыть изображение</a></div>
                                                                                                                                                                                                          </div>

                                                                                                                                                                                                                <footer>Подсказка: для публичных ссылок используй API-хостинг (imgbb/imgur) — так изображения будут доступны другим.</footer>
                                                                                                                                                                                                                    </div>
                                                                                                                                                                                                                      </main>

    <script>
    /*
      Вариант: загрузка через imgbb API (который принимает base64).
        Получи API ключ на https://imgbb.com и вставь ниже.
        */
        const IMGBB_API_KEY = '4a569847f7d6be115b4e46120f2d1f73'; // <- вставь свой ключ

        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const resultArea = document.getElementById('resultArea');
        const linkText = document.getElementById('linkText');
        const copyBtn = document.getElementById('copyBtn');
        const viewLink = document.getElementById('viewLink');

        let uploadedUrl = '';

        fileInput.addEventListener('change', async () => {
          if (!fileInput.files.length) return;
            const file = fileInput.files[0];
              const maxSize = 5*1024*1024;
                if (file.size > maxSize) { status.innerHTML = '<div style="color:red">Файл больше 5 МБ.</div>'; return; }
                  status.innerHTML = 'Загружаю <span class="spinner" aria-hidden="true"></span>';

                    // читаем как base64
                      const reader = new FileReader();
                        reader.onload = async (e) => {
                            const base64 = e.target.result.split(',')[1]; // без префикса data:...
                              try {
                                  // формируем запрос для imgbb
                                    const form = new FormData();
                                        form.append('key', IMGBB_API_KEY);
                                          form.append('image', base64);

                                            const res = await fetch('https://api.imgbb.com/1/upload', { method:'POST', body: form });
                                              const json = await res.json();
                                                if (json.success) {
                                                    uploadedUrl = json.data.url; // прямая ссылка
                                                        status.innerHTML = '<span style="color:green">Готово — ссылка получена.</span>';
                                                            resultArea.style.display = 'block';
                                                                updateLinkText();
                                                                    viewLink.href = uploadedUrl;
                                                                      } else {
                                                                          status.innerHTML = '<div style="color:red">Ошибка сервиса: ' + (json.error?.message || JSON.stringify(json)) + '</div>';
                                                                            }
                                                                              } catch (err) {
                                                                                  status.innerHTML = '<div style="color:red">Ошибка сети или неверный API ключ.</div>';
                                                                                    console.error(err);
                                                                                      }
                                                                                        };
                                                                                          reader.readAsDataURL(file);
                                                                                          });

                                                                                          document.querySelectorAll('input[name=format]').forEach(r => r.addEventListener('change', updateLinkText));

                                                                                          function updateLinkText() {
                                                                                            if (!uploadedUrl) return;
                                                                                              const fmt = document.querySelector('input[name=format]:checked').value;
                                                                                                let txt = '';
                                                                                                  switch (fmt) {
                                                                                                      case 'direct': txt = uploadedUrl; break;
                                                                                                          case 'html': txt = `<img src="${uploadedUrl}" alt="Uploaded image">`; break;
                                                                                                              case 'html_link': txt = `<a href="${uploadedUrl}" target="_blank"><img src="${uploadedUrl}" alt="Uploaded image"></a>`; break;
                                                                                                                  case 'bb_full_link': txt = `[url=${uploadedUrl}][img]${uploadedUrl}[/img][/url]`; break;
                                                                                                                    }
                                                                                                                      linkText.textContent = txt;
                                                                                                                      }

                                                                                                                      copyBtn.addEventListener('click', () => {
                                                                                                                        navigator.clipboard.writeText(linkText.textContent).then(() => {
                                                                                                                          copyBtn.textContent = 'Скопировано!';
                                                                                                                            setTimeout(() => copyBtn.textContent = 'Копировать', 2000);
                                                                                                                              }).catch(err => console.error('Ошибка копирования:', err));
                                                                                                                              });
                                                                                                                              </script>
</body>
</html>
