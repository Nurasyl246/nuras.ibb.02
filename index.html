<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nuras.ibb</title>
  <style>
    :root{
      --bg1:#050816;
      --bg2:#09142b;
      --card:#0b1220cc;
      --card2:#0d1730;
      --line:#1f3b77;
      --line2:#2f6bff;
      --text:#eaf1ff;
      --muted:#9db0d0;
      --blue:#3c7dff;
      --blue2:#74a7ff;
      --green:#2dd4bf;
      --shadow: 0 24px 80px rgba(0,0,0,.45);
      --radius: 24px;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      overflow-x: hidden;
      background:
        radial-gradient(circle at top left, rgba(60,125,255,.20), transparent 26%),
        radial-gradient(circle at top right, rgba(116,167,255,.16), transparent 22%),
        radial-gradient(circle at bottom left, rgba(45,212,191,.10), transparent 20%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
    }

    .glow {
      position: fixed;
      width: 280px;
      height: 280px;
      border-radius: 50%;
      filter: blur(36px);
      opacity: .22;
      pointer-events: none;
      z-index: 0;
      animation: drift 12s ease-in-out infinite;
    }
    .g1 { top: 8%; left: 6%; background: #2f6bff; }
    .g2 { top: 18%; right: 6%; background: #6ea8ff; animation-duration: 16s; }
    .g3 { bottom: 8%; left: 18%; background: #0ea5e9; animation-duration: 18s; }

    @keyframes drift {
      0%,100% { transform: translate(0,0) scale(1); }
      50% { transform: translate(18px,-20px) scale(1.08); }
    }

    @keyframes floatUp {
      0%,100% { transform: translateY(0) translateX(0); }
      50% { transform: translateY(-10px) translateX(6px); }
    }

    @keyframes shine {
      0%, 35% { transform: translateX(-120%); }
      70%, 100% { transform: translateX(120%); }
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
      z-index: 1;
    }

    .card {
      width: 100%;
      max-width: 760px;
      background: linear-gradient(180deg, rgba(13,23,48,.92), rgba(8,14,30,.94));
      border: 1px solid rgba(120,160,255,.18);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 22px;
      backdrop-filter: blur(12px);
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(120deg, transparent 0%, rgba(255,255,255,.05) 35%, transparent 70%);
      transform: translateX(-120%);
      animation: shine 6s ease-in-out infinite;
      pointer-events: none;
    }

    .top-banner {
      border: 1px solid rgba(116,167,255,.38);
      background: linear-gradient(180deg, rgba(8,18,38,.95), rgba(10,18,40,.8));
      border-radius: 18px;
      padding: 14px 16px;
      margin-bottom: 18px;
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03);
      animation: floatUp 5s ease-in-out infinite;
    }

    .top-banner .line1 {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .top-banner .line2 {
      font-size: 18px;
      font-weight: 700;
      color: #ffffff;
      letter-spacing: .2px;
    }

    .top-banner a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 16px;
      border-radius: 999px;
      text-decoration: none;
      color: white;
      font-weight: 700;
      border: 1px solid rgba(116,167,255,.55);
      background: linear-gradient(135deg, #214cff, #4a86ff);
      box-shadow: 0 10px 24px rgba(47,107,255,.25);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
    }

    .top-banner a:hover {
      transform: translateY(-1px) scale(1.02);
      box-shadow: 0 14px 28px rgba(47,107,255,.35);
      filter: brightness(1.05);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(26px, 4vw, 38px);
      line-height: 1.1;
      letter-spacing: .2px;
    }

    .subtitle {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .upload-wrap {
      margin: 16px 0 10px;
    }

    .upload-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      padding: 15px 18px;
      border-radius: 18px;
      border: 1px solid rgba(116,167,255,.45);
      background: linear-gradient(135deg, rgba(30,64,175,.95), rgba(18,96,170,.95));
      color: white;
      cursor: pointer;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: .8px;
      text-transform: uppercase;
      box-shadow: 0 18px 30px rgba(13,78,143,.22);
      transition: transform .2s ease, box-shadow .2s ease, filter .2s ease;
      user-select: none;
    }

    .upload-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 22px 40px rgba(13,78,143,.32);
      filter: brightness(1.06);
    }

    .small {
      margin-top: 10px;
      color: var(--muted);
      font-size: 12px;
      text-align: center;
    }

    .progress-wrap {
      margin-top: 16px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(116,167,255,.12);
    }

    .progress-top {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-track {
      height: 8px;
      background: rgba(255,255,255,.06);
      border-radius: 999px;
      overflow: hidden;
      border: 1px solid rgba(116,167,255,.12);
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #214cff, #2dd4bf);
      border-radius: 999px;
      transition: width .12s linear;
    }

    .copy-all-btn {
      margin-top: 12px;
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: 1px solid rgba(116,167,255,.3);
      background: linear-gradient(135deg, #162b5d, #23458c);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease, opacity .2s ease;
    }

    .copy-all-btn:hover { transform: translateY(-1px); filter: brightness(1.05); }
    .copy-all-btn:disabled { opacity: .5; cursor: not-allowed; }

    #status {
      margin-top: 12px;
      min-height: 22px;
      color: var(--text);
      font-size: 14px;
    }

    .spinner {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid rgba(255,255,255,.2);
      border-top: 2px solid #8ab4ff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      vertical-align: -3px;
      margin-left: 6px;
    }

    .preview-wrap {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(116,167,255,.12);
    }

    .preview-title {
      font-weight: 700;
      margin-bottom: 10px;
      color: #fff;
    }

    .preview-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
      gap: 10px;
    }

    .preview-grid img {
      width: 100%;
      height: 80px;
      object-fit: cover;
      border-radius: 12px;
      border: 1px solid rgba(116,167,255,.2);
      background: #050816;
    }

    .result {
      margin-top: 18px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(7, 13, 28, .75);
      border: 1px solid rgba(116,167,255,.16);
    }

    .image-block {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: rgba(255,255,255,.03);
      border: 1px solid rgba(116,167,255,.14);
    }

    .image-block.deleted {
      opacity: .55;
      filter: grayscale(.35);
    }

    .image-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .image-head h3 {
      margin: 0;
      font-size: 15px;
    }

    .uploaded-preview {
      width: 100%;
      max-height: 240px;
      object-fit: contain;
      background: #050816;
      border-radius: 14px;
      border: 1px solid rgba(116,167,255,.16);
    }

    .section-title {
      margin: 14px 0 8px;
      font-weight: 700;
      color: #fff;
    }

    .field {
      margin-top: 8px;
    }

    .field-title {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field-row {
      display: flex;
      gap: 8px;
      align-items: stretch;
    }

    .link-value {
      flex: 1;
      min-height: 46px;
      padding: 11px 12px;
      border-radius: 12px;
      border: 1px solid rgba(116,167,255,.18);
      background: rgba(255,255,255,.05);
      color: #eaf1ff;
      font-family: monospace;
      font-size: 13px;
      resize: vertical;
    }

    .copy-btn {
      padding: 0 16px;
      min-width: 124px;
      background: linear-gradient(135deg, #14b8a6, #2dd4bf);
      color: #06131d;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      font-weight: 800;
      transition: transform .2s ease, filter .2s ease, opacity .2s ease;
    }

    .copy-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.06);
    }

    .copy-btn:active { transform: translateY(0); }
    .copy-btn.mini {
      min-width: 108px;
      border-radius: 12px;
      padding: 0 12px;
    }

    .delete-btn {
      margin-top: 12px;
      width: 100%;
      padding: 10px 12px;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #ef4444, #b91c1c);
      color: #fff;
      font-weight: 800;
      cursor: pointer;
      transition: transform .2s ease, filter .2s ease, opacity .2s ease;
    }

    .delete-btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.05);
    }

    .deleted-note {
      margin-top: 8px;
      font-size: 12px;
      color: #fca5a5;
      display: none;
    }

    .image-block.deleted .deleted-note {
      display: block;
    }

    footer {
      margin-top: 18px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
      text-align: center;
    }

    @media (max-width: 520px) {
      .card { padding: 16px; }
      .field-row { flex-direction: column; }
      .copy-btn.mini, .copy-btn { width: 100%; min-height: 46px; }
      .top-banner .line2 { font-size: 16px; }
      .image-head { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <div class="glow g1" aria-hidden="true"></div>
  <div class="glow g2" aria-hidden="true"></div>
  <div class="glow g3" aria-hidden="true"></div>

  <main class="wrap">
    <div class="card">
      <div class="top-banner">
        <div class="line1">Подпишись на Нураса в ВК!</div>
        <div class="line2">Nuras.ibb</div>
        <div style="margin-top:6px;color:#b8c8e8;font-size:13px;">Лучший способ делиться своими моментами</div>
        <a href="https://vk.ru/nurasylsattar" target="_blank" rel="noopener">ПОДПИСАТЬСЯ</a>
      </div>

      <h1>Загрузите фото — получите ссылку</h1>
      <p class="subtitle">Быстрая загрузка, предпросмотр, прогресс и все нужные форматы ссылок.</p>

      <div class="upload-wrap">
        <input id="fileInput" type="file" accept="image/*" multiple style="display:none" />
        <label class="upload-btn" for="fileInput">ВЫБРАТЬ И ЗАГРУЗИТЬ</label>
        <div class="small">Можно выбрать до 20 фото сразу.</div>
      </div>

      <div class="progress-wrap">
        <div class="progress-top">
          <span>Прогресс загрузки</span>
          <span id="progressPercent">0%</span>
        </div>
        <div class="progress-track" aria-hidden="true">
          <div id="progressFill" class="progress-fill"></div>
        </div>
        <button id="copyAllBtn" class="copy-all-btn" type="button" disabled>Скопировать всё</button>
      </div>

      <div id="previewWrap" class="preview-wrap" style="display:none;">
        <div class="preview-title">Превью перед загрузкой</div>
        <div id="previewGrid" class="preview-grid"></div>
      </div>

      <div id="status"></div>

      <div id="resultArea" class="result" style="display:none">
        <div id="imagesContainer"></div>
      </div>

      <footer>
        Красиво, просто и удобно.
      </footer>
    </div>
  </main>

  <script>
    const IMGBB_API_KEY = '4a569847f7d6be115b4e46120f2d1f73';

    const fileInput = document.getElementById('fileInput');
    const status = document.getElementById('status');
    const resultArea = document.getElementById('resultArea');
    const imagesContainer = document.getElementById('imagesContainer');
    const previewWrap = document.getElementById('previewWrap');
    const previewGrid = document.getElementById('previewGrid');
    const progressFill = document.getElementById('progressFill');
    const progressPercent = document.getElementById('progressPercent');
    const copyAllBtn = document.getElementById('copyAllBtn');

    function setProgress(percent) {
      const value = Math.max(0, Math.min(100, Math.round(percent)));
      progressFill.style.width = value + '%';
      progressPercent.textContent = value + '%';
    }

    function safeText(value) {
      return String(value ?? '');
    }

    function makeField(title, value) {
      const field = document.createElement('div');
      field.className = 'field';

      const label = document.createElement('div');
      label.className = 'field-title';
      label.textContent = title;

      const row = document.createElement('div');
      row.className = 'field-row';

      const ta = document.createElement('textarea');
      ta.className = 'link-value';
      ta.readOnly = true;
      ta.value = safeText(value);

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'copy-btn mini';
      btn.textContent = 'Копировать';
      btn.dataset.copyRow = '1';

      row.appendChild(ta);
      row.appendChild(btn);
      field.appendChild(label);
      field.appendChild(row);

      return field;
    }

    function buildCopyText(index, data) {
      const viewerUrl = data.url_viewer || '';
      const fullUrl = data.url || '';
      const displayUrl = data.display_url || fullUrl;
      const mediumUrl = data.medium?.url || displayUrl;
      const thumbUrl = data.thumb?.url || displayUrl;

      return [
        `[Фото ${index}]`,
        'Ссылки на просмотр',
        `Ссылка на просмотр: ${viewerUrl}`,
        `Прямая ссылка: ${fullUrl}`,
        '',
        'HTML-коды',
        `HTML-код изображения: <img src="${displayUrl}" alt="Uploaded image">`,
        `HTML-код полноразмерного изображения со ссылкой: <a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${fullUrl}" alt="Uploaded image"></a>`,
        `HTML-код среднего размера со ссылкой: <a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${mediumUrl}" alt="Uploaded image"></a>`,
        `HTML-код миниатюры со ссылкой: <a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${thumbUrl}" alt="Uploaded image"></a>`,
        '',
        'ВВ-коды',
        `ВВ-код полноразмерного изображения: [img]${fullUrl}[/img]`,
        `ВВ-код полноразмерного изображения со ссылкой: [url=${viewerUrl}][img]${fullUrl}[/img][/url]`,
        `ВВ-код среднего размера со ссылкой: [url=${viewerUrl}][img]${mediumUrl}[/img][/url]`,
        `ВВ-код миниатюры со ссылкой: [url=${viewerUrl}][img]${thumbUrl}[/img][/url]`
      ].join('\n');
    }

    function createImageBlock(index, data) {
      const viewerUrl = data.url_viewer || '';
      const fullUrl = data.url || '';
      const displayUrl = data.display_url || fullUrl;
      const mediumUrl = data.medium?.url || displayUrl;
      const thumbUrl = data.thumb?.url || displayUrl;
      const deleteUrl = data.delete_url || '';

      const block = document.createElement('div');
      block.className = 'image-block';
      block.dataset.copyText = buildCopyText(index, data);
      block.dataset.deleteUrl = deleteUrl;

      const head = document.createElement('div');
      head.className = 'image-head';

      const title = document.createElement('h3');
      title.textContent = `[Фото ${index}]`;

      const badge = document.createElement('span');
      badge.className = 'badge';
      badge.textContent = 'Готово';

      head.appendChild(title);
      head.appendChild(badge);

      const img = document.createElement('img');
      img.className = 'uploaded-preview';
      img.src = displayUrl;
      img.alt = `Фото ${index}`;

      const sec1 = document.createElement('div');
      sec1.className = 'section-title';
      sec1.textContent = 'Ссылки на просмотр';

      const sec2 = document.createElement('div');
      sec2.className = 'section-title';
      sec2.textContent = 'HTML-коды';

      const sec3 = document.createElement('div');
      sec3.className = 'section-title';
      sec3.textContent = 'ВВ-коды';

      block.appendChild(head);
      block.appendChild(img);
      block.appendChild(sec1);
      block.appendChild(makeField('Ссылка на просмотр', viewerUrl));
      block.appendChild(makeField('Прямая ссылка', fullUrl));

      block.appendChild(sec2);
      block.appendChild(makeField('HTML-код изображения', `<img src="${displayUrl}" alt="Uploaded image">`));
      block.appendChild(makeField(
        'HTML-код полноразмерного изображения со ссылкой',
        `<a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${fullUrl}" alt="Uploaded image"></a>`
      ));
      block.appendChild(makeField(
        'HTML-код среднего размера со ссылкой',
        `<a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${mediumUrl}" alt="Uploaded image"></a>`
      ));
      block.appendChild(makeField(
        'HTML-код миниатюры со ссылкой',
        `<a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${thumbUrl}" alt="Uploaded image"></a>`
      ));

      block.appendChild(sec3);
      block.appendChild(makeField('ВВ-код полноразмерного изображения', `[img]${fullUrl}[/img]`));
      block.appendChild(makeField(
        'ВВ-код полноразмерного изображения со ссылкой',
        `[url=${viewerUrl}][img]${fullUrl}[/img][/url]`
      ));
      block.appendChild(makeField(
        'ВВ-код среднего размера со ссылкой',
        `[url=${viewerUrl}][img]${mediumUrl}[/img][/url]`
      ));
      block.appendChild(makeField(
        'ВВ-код миниатюры со ссылкой',
        `[url=${viewerUrl}][img]${thumbUrl}[/img][/url]`
      ));

      const deleteBtn = document.createElement('button');
      deleteBtn.type = 'button';
      deleteBtn.className = 'delete-btn';
      deleteBtn.dataset.deleteImage = '1';
      deleteBtn.textContent = 'Удалить изображение';

      const deletedNote = document.createElement('div');
      deletedNote.className = 'deleted-note';
      deletedNote.textContent = 'Изображение помечено как удалённое.';

      block.appendChild(deleteBtn);
      block.appendChild(deletedNote);

      return block;
    }

    function copyRow(button) {
      const row = button.closest('.field-row');
      if (!row) return;

      const ta = row.querySelector('.link-value');
      if (!ta) return;

      navigator.clipboard.writeText(ta.value).then(() => {
        const old = button.textContent;
        button.textContent = 'Скопировано!';
        setTimeout(() => {
          button.textContent = old;
        }, 1200);
      }).catch(err => console.error('Ошибка копирования:', err));
    }

      `HTML-код полноразмерного изображения со ссылкой: <a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${fullUrl}" alt="Uploaded image"></a>`,
      `HTML-код среднего размера со ссылкой: <a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${mediumUrl}" alt="Uploaded image"></a>`,
      `HTML-код миниатюры со ссылкой: <a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${thumbUrl}" alt="Uploaded image"></a>`,
      '',
      'ВВ-коды',
      `ВВ-код полноразмерного изображения: [img]${fullUrl}[/img]`,
      `ВВ-код полноразмерного изображения со ссылкой: [url=${viewerUrl}][img]${fullUrl}[/img][/url]`,
      `ВВ-код среднего размера со ссылкой: [url=${viewerUrl}][img]${mediumUrl}[/img][/url]`,
      `ВВ-код миниатюры со ссылкой: [url=${viewerUrl}][img]${thumbUrl}[/img][/url]`
    ].join('\n');
  }

  function createImageBlock(index, data) {
    const viewerUrl = data.url_viewer || '';
    const fullUrl = data.url || '';
    const displayUrl = data.display_url || fullUrl;
    const mediumUrl = data.medium?.url || displayUrl;
    const thumbUrl = data.thumb?.url || displayUrl;
    const deleteUrl = data.delete_url || '';

    const block = document.createElement('div');
    block.className = 'image-block';
    block.dataset.copyText = buildCopyText(index, data);
    block.dataset.deleteUrl = deleteUrl;

    const head = document.createElement('div');
    head.className = 'image-head';

    const title = document.createElement('h3');
    title.textContent = `[Фото ${index}]`;

    const badge = document.createElement('span');
    badge.className = 'badge';
    badge.textContent = 'Готово';

    head.appendChild(title);
    head.appendChild(badge);

    const img = document.createElement('img');
    img.className = 'uploaded-preview';
    img.src = displayUrl;
    img.alt = `Фото ${index}`;

    const sec1 = document.createElement('div');
    sec1.className = 'section-title';
    sec1.textContent = 'Ссылки на просмотр';

    const sec2 = document.createElement('div');
    sec2.className = 'section-title';
    sec2.textContent = 'HTML-коды';

    const sec3 = document.createElement('div');
    sec3.className = 'section-title';
    sec3.textContent = 'ВВ-коды';

    block.appendChild(head);
    block.appendChild(img);
    block.appendChild(sec1);
    block.appendChild(makeField('Ссылка на просмотр', viewerUrl));
    block.appendChild(makeField('Прямая ссылка', fullUrl));

    block.appendChild(sec2);
    block.appendChild(makeField('HTML-код изображения', `<img src="${displayUrl}" alt="Uploaded image">`));
    block.appendChild(makeField(
      'HTML-код полноразмерного изображения со ссылкой',
      `<a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${fullUrl}" alt="Uploaded image"></a>`
    ));
    block.appendChild(makeField(
      'HTML-код среднего размера со ссылкой',
      `<a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${mediumUrl}" alt="Uploaded image"></a>`
    ));
    block.appendChild(makeField(
      'HTML-код миниатюры со ссылкой',
      `<a href="${viewerUrl}" target="_blank" rel="noopener"><img src="${thumbUrl}" alt="Uploaded image"></a>`
    ));

    block.appendChild(sec3);
    block.appendChild(makeField('ВВ-код полноразмерного изображения', `[img]${fullUrl}[/img]`));
    block.appendChild(makeField(
      'ВВ-код полноразмерного изображения со ссылкой',
      `[url=${viewerUrl}][img]${fullUrl}[/img][/url]`
    ));
    block.appendChild(makeField(
      'ВВ-код среднего размера со ссылкой',
      `[url=${viewerUrl}][img]${mediumUrl}[/img][/url]`
    ));
    block.appendChild(makeField(
      'ВВ-код миниатюры со ссылкой',
      `[url=${viewerUrl}][img]${thumbUrl}[/img][/url]`
    ));

    const deleteBtn = document.createElement('button');
    deleteBtn.type = 'button';
    deleteBtn.className = 'delete-btn';
    deleteBtn.dataset.deleteImage = '1';
    deleteBtn.textContent = 'Удалить изображение';

    const deletedNote = document.createElement('div');
    deletedNote.className = 'deleted-note';
    deletedNote.textContent = 'Изображение помечено как удалённое.';

    block.appendChild(deleteBtn);
    block.appendChild(deletedNote);

    return block;
  }

  function copyRow(button) {
    const row = button.closest('.field-row');
    if (!row) return;

    const ta = row.querySelector('.link-value');
    if (!ta) return;

    navigator.clipboard.writeText(ta.value).then(() => {
      const old = button.textContent;
      button.textContent = 'Скопировано!';
      setTimeout(() => {
        button.textContent = old;
      }, 1200);
    }).catch(err => console.error('Ошибка копирования:', err));
  }

  async function copyAll() {
    const blocks = Array.from(document.querySelectorAll('.image-block:not(.deleted)'));
    const text = blocks.map(b => b.dataset.copyText).filter(Boolean).join('\n\n');

    if (!text) return;

    try {
      await navigator.clipboard.writeText(text);
      const old = copyAllBtn.textContent;
      copyAllBtn.textContent = 'Скопировано!';
      setTimeout(() => {
        copyAllBtn.textContent = old;
      }, 1200);
    } catch (err) {
      console.error('Ошибка копирования:', err);
    }
  }

  function deleteImage(button) {
    const block = button.closest('.image-block');
    if (!block) return;

    const deleteUrl = block.dataset.deleteUrl;
    if (!deleteUrl) {
      status.innerHTML = '<span style="color:#ff7b7b">Для этого фото не пришёл delete_url.</span>';
      return;
    }

    const beacon = new Image();
    beacon.src = deleteUrl + (deleteUrl.includes('?') ? '&' : '?') + 't=' + Date.now();

    block.classList.add('deleted');
    button.disabled = true;
    button.textContent = 'Удалено';

    status.innerHTML = '<span style="color:#2dd4bf;font-weight:700">Изображение отправлено на удаление.</span>';
  }

  document.addEventListener('click', (e) => {
    const copyBtn = e.target.closest('[data-copy-row]');
    if (copyBtn) {
      copyRow(copyBtn);
      return;
    }

    const delBtn = e.target.closest('[data-delete-image]');
    if (delBtn) {
      deleteImage(delBtn);
    }
  });

  copyAllBtn.addEventListener('click', copyAll);

  async function uploadOne(file, index, total) {
    return new Promise((resolve) => {
      const reader = new FileReader();

      reader.onerror = () => {
        status.innerHTML = `<span style="color:#ff7b7b">Не удалось прочитать файл: ${file.name}</span>`;
        resolve(false);
      };

      reader.onload = () => {
        const base64 = String(reader.result).split(',')[1] || '';

        const xhr = new XMLHttpRequest();
        const form = new FormData();
        form.append('key', IMGBB_API_KEY);
        form.append('image', base64);

        xhr.open('POST', 'https://api.imgbb.com/1/upload');

        xhr.upload.onprogress = (event) => {
          if (!event.lengthComputable) return;
          const filePart = event.loaded / event.total;
          const overall = (((index - 1) + filePart) / total) * 100;
          setProgress(overall);
          status.innerHTML = `Загрузка ${index}/${total}: ${Math.round(filePart * 100)}% <span class="spinner" aria-hidden="true"></span>`;
        };

        xhr.onload = () => {
          try {
            const json = JSON.parse(xhr.responseText);

            if (json && json.success) {
              const block = createImageBlock(index, json.data);
              imagesContainer.appendChild(block);
              copyAllBtn.disabled = false;
              resolve(true);
            } else {
              status.innerHTML = `<span style="color:#ff7b7b">Ошибка сервиса: ${json?.error?.message || 'неизвестная ошибка'}</span>`;
              resolve(false);
            }
          } catch (err) {
            status.innerHTML = '<span style="color:#ff7b7b">Не удалось обработать ответ сервиса.</span>';
            console.error(err);
            resolve(false);
          }
        };

        xhr.onerror = () => {
          status.innerHTML = `<span style="color:#ff7b7b">Ошибка сети при загрузке файла: ${file.name}</span>`;
          resolve(false);
        };

        xhr.send(form);
      };

      reader.readAsDataURL(file);
    });
  }

  fileInput.addEventListener('change', async () => {
    const files = Array.from(fileInput.files).slice(0, 20);
    if (!files.length) return;

    previewWrap.style.display = 'block';
    previewGrid.innerHTML = '';
    imagesContainer.innerHTML = '';
    resultArea.style.display = 'block';
    copyAllBtn.disabled = true;
    setProgress(0);

    if (fileInput.files.length > 20) {
      status.innerHTML = '<span style="color:#fbbf24">Выбраны первые 20 фото.</span>';
    } else {
      status.innerHTML = '';
    }

    files.forEach(file => {
      const img = document.createElement('img');
      img.src = URL.createObjectURL(file);
      img.alt = file.name;
      previewGrid.appendChild(img);
    });

    for (let i = 0; i < files.length; i++) {
      await uploadOne(files[i], i + 1, files.length);
    }

    setProgress(100);
    if (imagesContainer.children.length > 0) {
      status.innerHTML = '<span style="color:#2dd4bf;font-weight:700">Готово — все ссылки получены.</span>';
    } else {
      status.innerHTML = '<span style="color:#ff7b7b">Ничего не загрузилось.</span>';
    }

    fileInput.value = '';
  });
</script>
